services:
  mysql:
    image: mysql:8.0
    container_name: wallets-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: mysql
      MYSQL_DATABASE: wallet_db
      MYSQL_USER: mysql
      MYSQL_PASSWORD: mysql
    ports:
      - "3232:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7.0-alpine
    container_name: wallets-redis
    restart: always
    ports:
      - "6262:6379"
    command: redis-server --requirepass redis
    volumes:
      - redis_data:/data

volumes:
  mysql_data:
  redis_data: